<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexusStream — Holographic Video Universe</title>
  <link rel="stylesheet" href="assets/css/global.css" />
  <style>
    /* ── HERO ─────────────────────────── */
    .hero {
      position:relative; height:88vh; min-height:560px;
      display:flex; align-items:flex-end;
      overflow:hidden;
    }
    .hero__slides {
      position:absolute; inset:0;
    }
    .hero__slide {
      position:absolute; inset:0;
      opacity:0; transition:opacity 0.8s ease;
    }
    .hero__slide.active { opacity:1; }
    .hero__slide-bg {
      position:absolute; inset:0;
      background-size:cover; background-position:center;
      transform:scale(1.06);
      transition:transform 8s ease;
      filter:saturate(1.3) brightness(0.55);
    }
    .hero__slide.active .hero__slide-bg { transform:scale(1); }
    .hero__overlay {
      position:absolute; inset:0;
      background:
        linear-gradient(to right, rgba(0,4,8,0.85) 35%, transparent 70%),
        linear-gradient(to top, rgba(0,4,8,0.9) 15%, transparent 50%);
    }
    .hero__scan {
      position:absolute; inset:0; pointer-events:none;
      background:repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,240,255,0.018) 3px, rgba(0,240,255,0.018) 4px
      );
    }
    .hero__content {
      position:relative; z-index:2;
      padding:0 48px 64px;
      max-width:640px;
    }
    .hero__category {
      display:inline-block;
      margin-bottom:16px;
      padding:4px 14px;
      border:1px solid rgba(0,240,255,0.4);
      border-radius:2px;
      font-family:var(--font-mono);
      font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase;
      color:var(--cyan);
      background:rgba(0,240,255,0.08);
    }
    .hero__title {
      font-family:var(--font-display);
      font-size:clamp(1.6rem, 3vw, 2.8rem);
      font-weight:900; line-height:1.1;
      letter-spacing:0.02em;
      color:#fff;
      text-shadow:0 0 40px rgba(0,240,255,0.2);
      margin-bottom:16px;
    }
    .hero__meta {
      font-size:0.8rem; color:var(--text-dim);
      font-family:var(--font-mono);
      margin-bottom:28px;
      display:flex; gap:16px; align-items:center;
    }
    .hero__meta-dot { width:4px; height:4px; border-radius:50%; background:var(--cyan); }
    .hero__actions { display:flex; gap:12px; }
    .hero__progress {
      position:absolute; bottom:0; left:0; right:0;
      display:flex; gap:4px; padding:0 48px 24px;
      z-index:2;
    }
    .hero__dot {
      flex:1; height:2px; max-width:60px;
      background:rgba(255,255,255,0.2);
      border-radius:1px; cursor:pointer;
      transition:background 0.3s;
    }
    .hero__dot.active { background:var(--cyan); box-shadow:0 0 8px var(--cyan); }
    .hero__chevrons {
      position:absolute; right:48px; bottom:32px; z-index:2;
      display:flex; gap:8px;
    }
    .hero__chevron {
      width:36px; height:36px;
      border:var(--border); border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      color:var(--cyan); font-size:0.9rem;
      transition:all 0.2s; cursor:pointer;
      background:rgba(0,4,8,0.5);
    }
    .hero__chevron:hover {
      background:var(--cyan-dim);
      box-shadow:0 0 16px var(--cyan-dim);
    }

    /* ── HOME SECTIONS ───────────────── */
    .home-section { margin-top:56px; }
    .categories-bar {
      display:flex; gap:10px; overflow-x:auto;
      margin-bottom:40px; padding-bottom:4px;
      scrollbar-width:none;
    }
    .categories-bar::-webkit-scrollbar { display:none; }
    .cat-chip {
      flex-shrink:0; padding:8px 20px;
      font-family:var(--font-display);
      font-size:0.65rem; font-weight:700;
      letter-spacing:0.1em; text-transform:uppercase;
      border:var(--border); border-radius:3px;
      color:var(--text-dim);
      background:var(--surface);
      transition:all 0.2s; cursor:pointer;
    }
    .cat-chip:hover { color:var(--cyan); border-color:rgba(0,240,255,0.4); }
    .cat-chip.active {
      color:var(--cyan); border-color:rgba(0,240,255,0.5);
      background:var(--cyan-dim);
      box-shadow:0 0 16px rgba(0,240,255,0.1);
    }
    .cat-chip--gaming.active { color:#ff6b00; border-color:rgba(255,107,0,0.5); background:rgba(255,107,0,0.08); }
    .cat-chip--tech.active   { color:var(--cyan); }
    .cat-chip--edu.active    { color:#00ff9d; border-color:rgba(0,255,157,0.5); background:rgba(0,255,157,0.08); }
    .cat-chip--ai.active     { color:var(--magenta); border-color:rgba(255,0,212,0.5); background:rgba(255,0,212,0.08); }
  </style>
</head>
<body>

<!-- ── LOADER ── -->
<div class="ns-loader" id="ns-loader">
  <div class="ns-loader__ring"></div>
  <div class="ns-loader__text" id="loader-text">INITIALIZING NEXUSSTREAM</div>
  <div class="ns-loader__bar"><div class="ns-loader__bar-fill" id="loader-bar"></div></div>
</div>

<!-- ── HEADER ── -->
<header id="ns-header">
  <div class="ns-header__inner">
    <a href="index.html" class="ns-logo">NEXUS<span>STREAM</span></a>
    <nav class="ns-nav">
      <a href="index.html" data-page="index.html">Home</a>
      <a href="explore.html" data-page="explore.html">Explore</a>
      <a href="about.html" data-page="about.html">About</a>
    </nav>
    <button class="ns-header__search-btn" onclick="UI.pageTransition('search.html')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      NEURAL SEARCH
    </button>
  </div>
</header>

<!-- ── MAIN ── -->
<main class="ns-page">

  <!-- HERO SWIPE -->
  <section class="hero" id="hero">
    <div class="hero__slides" id="heroSlides"></div>
    <div class="hero__scan"></div>
    <div class="hero__content" id="heroContent"></div>
    <div class="hero__progress" id="heroProgress"></div>
    <div class="hero__chevrons">
      <button class="hero__chevron" id="heroPrev">&#8592;</button>
      <button class="hero__chevron" id="heroNext">&#8594;</button>
    </div>
  </section>

  <div class="ns-container">

    <!-- CATEGORY CHIPS -->
    <div class="categories-bar" id="categoriesBar"></div>

    <!-- FEATURED CHANNELS -->
    <section class="home-section">
      <div class="ns-section-header">
        <h2>Featured Channels</h2>
        <div class="ns-section-header__line"></div>
        <div class="ns-section-header__tag">LIVE CREATORS</div>
      </div>
      <div class="ns-row" id="channelsRow"></div>
    </section>

    <!-- TRENDING -->
    <section class="home-section">
      <div class="ns-section-header">
        <h2>Trending Now</h2>
        <div class="ns-section-header__line"></div>
        <div class="ns-section-header__tag">HOT</div>
      </div>
      <div class="ns-row" id="trendingRow"></div>
    </section>

    <!-- GAMING -->
    <section class="home-section" id="section-gaming">
      <div class="ns-section-header">
        <h2>Gaming</h2>
        <div class="ns-section-header__line"></div>
        <div class="ns-section-header__tag" style="color:#ff6b00;border-color:rgba(255,107,0,0.4)">PLAY</div>
      </div>
      <div class="ns-row" id="gamingRow"></div>
    </section>

    <!-- TECH -->
    <section class="home-section" id="section-tech">
      <div class="ns-section-header">
        <h2>Tech</h2>
        <div class="ns-section-header__line"></div>
      </div>
      <div class="ns-row" id="techRow"></div>
    </section>

    <!-- EDUCATION -->
    <section class="home-section" id="section-education">
      <div class="ns-section-header">
        <h2>Education</h2>
        <div class="ns-section-header__line"></div>
        <div class="ns-section-header__tag" style="color:#00ff9d;border-color:rgba(0,255,157,0.4)">LEARN</div>
      </div>
      <div class="ns-row" id="eduRow"></div>
    </section>

    <!-- AI / FUTURISTIC -->
    <section class="home-section" id="section-ai">
      <div class="ns-section-header">
        <h2>AI / Futuristic</h2>
        <div class="ns-section-header__line"></div>
        <div class="ns-section-header__tag" style="color:var(--magenta);border-color:rgba(255,0,212,0.4)">FUTURE</div>
      </div>
      <div class="ns-row" id="aiRow"></div>
    </section>

  </div>
</main>

<!-- ── FOOTER ── -->
<footer id="ns-footer">
  <div class="ns-footer__brand">NEXUS<span style="color:var(--magenta)">STREAM</span></div>
  <div class="ns-footer__links">
    <a href="index.html">Home</a>
    <a href="explore.html">Explore</a>
    <a href="search.html">Search</a>
    <a href="about.html">About</a>
  </div>
  <div class="ns-footer__attr">Powered by YouTube Data API v3</div>
</footer>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script>
(async () => {
  // ── Loading sequence ──
  const loader = document.getElementById('ns-loader');
  const loaderText = document.getElementById('loader-text');
  const loaderBar = document.getElementById('loader-bar');
  const messages = ['LOADING DATA STREAMS', 'RENDERING HOLOGRAMS', 'SYNCING NEXUS NODES', 'LAUNCH READY'];
  let mi = 0;
  const textCycle = setInterval(() => {
    loaderText.textContent = messages[mi++ % messages.length];
  }, 500);
  setTimeout(() => loaderBar.style.width = '100%', 100);
  setTimeout(() => {
    clearInterval(textCycle);
    loader.classList.add('hidden');
    setTimeout(() => loader.remove(), 500);
  }, 2000);

  // ── Fetch data ──
  const { items: videos } = await API.getTrending(10);
  const channels = API.getMockData().channels;

  // ── Hero ──
  const heroSlides = document.getElementById('heroSlides');
  const heroContent = document.getElementById('heroContent');
  const heroProgress = document.getElementById('heroProgress');
  const heroVids = videos.slice(0, 5);
  let heroIdx = 0;

  heroVids.forEach((v, i) => {
    const slide = document.createElement('div');
    slide.className = 'hero__slide' + (i === 0 ? ' active' : '');
    slide.innerHTML = `
      <div class="hero__slide-bg" style="background-image:url('${v.thumb}')"></div>
      <div class="hero__overlay"></div>
    `;
    heroSlides.appendChild(slide);

    const dot = document.createElement('div');
    dot.className = 'hero__dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => goToSlide(i));
    heroProgress.appendChild(dot);
  });

  function setHeroContent(v) {
    heroContent.innerHTML = `
      <div class="hero__category">${v.category || 'Trending'}</div>
      <h1 class="hero__title">${v.title}</h1>
      <div class="hero__meta">
        <span>${v.channel}</span>
        <div class="hero__meta-dot"></div>
        <span>${v.views} views</span>
        <div class="hero__meta-dot"></div>
        <span>${v.duration}</span>
      </div>
      <div class="hero__actions">
        <button class="ns-btn ns-btn--primary" onclick="UI.pageTransition('watch.html?v=${v.id}')">▶ WATCH NOW</button>
        <button class="ns-btn ns-btn--ghost">+ QUEUE</button>
      </div>
    `;
  }
  setHeroContent(heroVids[0]);

  function goToSlide(idx) {
    const slides = heroSlides.querySelectorAll('.hero__slide');
    const dots = heroProgress.querySelectorAll('.hero__dot');
    slides[heroIdx].classList.remove('active');
    dots[heroIdx].classList.remove('active');
    heroIdx = (idx + heroVids.length) % heroVids.length;
    slides[heroIdx].classList.add('active');
    dots[heroIdx].classList.add('active');
    setHeroContent(heroVids[heroIdx]);
  }

  document.getElementById('heroPrev').addEventListener('click', () => goToSlide(heroIdx - 1));
  document.getElementById('heroNext').addEventListener('click', () => goToSlide(heroIdx + 1));
  setInterval(() => goToSlide(heroIdx + 1), 6000);

  // ── Category chips ──
  const cats = [
    { label:'All', filter:'all', cls:'' },
    { label:'Gaming', filter:'Gaming', cls:'gaming' },
    { label:'Tech', filter:'Tech', cls:'tech' },
    { label:'Education', filter:'Education', cls:'edu' },
    { label:'AI / Futuristic', filter:'AI', cls:'ai' },
  ];
  const cBar = document.getElementById('categoriesBar');
  cats.forEach((c, i) => {
    const chip = document.createElement('button');
    chip.className = `cat-chip cat-chip--${c.cls}${i===0?' active':''}`;
    chip.textContent = c.label;
    chip.addEventListener('click', () => {
      document.querySelectorAll('.cat-chip').forEach(cc=>cc.classList.remove('active'));
      chip.classList.add('active');
      if (c.filter === 'all') {
        document.querySelectorAll('.home-section').forEach(s=>s.style.display='');
      } else {
        document.querySelectorAll('.home-section').forEach(s=>{
          const cat = s.id.split('-')[1];
          s.style.display = s.id.includes(c.filter.toLowerCase().split('/')[0].trim()) ? '' : 'none';
        });
      }
    });
    cBar.appendChild(chip);
  });

  // ── Featured Channels ──
  const chRow = document.getElementById('channelsRow');
  channels.forEach((ch, i) => {
    const el = UI.renderChannelAvatar(ch);
    chRow.appendChild(el);
    UI.buildCardEffect(el, 100 + i * 100);
  });

  // ── Video rows ──
  function fillRow(rowId, filter) {
    const row = document.getElementById(rowId);
    const filtered = filter ? videos.filter(v => v.category === filter) : videos;
    const arr = filtered.length ? filtered : videos.slice(0, 4);
    arr.forEach((v, i) => {
      const card = UI.renderVideoCard(v);
      row.appendChild(card);
      UI.buildCardEffect(card, i * 70);
    });
  }
  fillRow('trendingRow', null);
  fillRow('gamingRow', 'Gaming');
  fillRow('techRow', 'Tech');
  fillRow('eduRow', 'Education');
  fillRow('aiRow', 'AI');

  // ── Particle field ──
  UI.createParticleField(document.querySelector('.hero'), 40);
})();
</script>
</body>
</html>
