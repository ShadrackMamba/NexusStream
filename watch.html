<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch — NexusStream</title>
  <link rel="stylesheet" href="assets/css/global.css" />
  <style>
    .watch-layout {
      display:grid;
      grid-template-columns:1fr 340px;
      grid-template-rows:auto auto;
      gap:24px;
      padding:24px;
      max-width:1400px;
      margin:0 auto;
    }
    @media(max-width:900px) {
      .watch-layout { grid-template-columns:1fr; }
    }

    /* ── Player ── */
    .player-wrap {
      position:relative;
      background:#000;
      border-radius:var(--radius-lg);
      overflow:hidden;
      border:1px solid rgba(0,240,255,0.15);
      box-shadow:0 0 60px rgba(0,240,255,0.08);
      transition:box-shadow 0.5s ease;
    }
    .player-wrap.playing {
      box-shadow:0 0 80px rgba(0,240,255,0.15), 0 0 160px rgba(0,240,255,0.05);
      border-color:rgba(0,240,255,0.3);
      animation:pulseGlow 3s ease-in-out infinite;
    }
    .player-wrap.paused { opacity:0.85; }
    .player-frame { width:100%; aspect-ratio:16/9; display:block; }
    .player-corner {
      position:absolute; width:20px; height:20px;
      border-color:var(--cyan);
      border-style:solid;
      pointer-events:none;
    }
    .player-corner--tl { top:8px; left:8px; border-width:2px 0 0 2px; }
    .player-corner--tr { top:8px; right:8px; border-width:2px 2px 0 0; }
    .player-corner--bl { bottom:8px; left:8px; border-width:0 0 2px 2px; }
    .player-corner--br { bottom:8px; right:8px; border-width:0 2px 2px 0; }
    .player-energy {
      position:absolute; inset:0; pointer-events:none;
      border-radius:inherit;
      opacity:0; transition:opacity 0.5s;
      background:radial-gradient(ellipse at center bottom, rgba(0,240,255,0.06) 0%, transparent 60%);
    }
    .player-wrap.playing .player-energy { opacity:1; }

    /* ── Info Panel ── */
    .video-info {
      grid-column:1;
      padding:20px;
      background:var(--surface);
      border:var(--border);
      border-radius:var(--radius-lg);
    }
    .video-info__title {
      font-family:var(--font-display);
      font-size:1.1rem; font-weight:700;
      line-height:1.3; margin-bottom:16px;
      color:#fff;
    }
    .video-info__stats {
      display:flex; gap:16px; align-items:center;
      margin-bottom:16px;
      font-family:var(--font-mono); font-size:0.72rem; color:var(--text-dim);
    }
    .video-info__stat span { color:var(--cyan); }
    .video-info__actions {
      display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap;
    }
    .info-btn {
      padding:7px 16px;
      font-family:var(--font-mono);
      font-size:0.7rem; letter-spacing:0.05em;
      border-radius:var(--radius);
      border:var(--border);
      color:var(--text-dim);
      background:var(--surface2);
      transition:all 0.2s;
    }
    .info-btn:hover { color:var(--cyan); border-color:rgba(0,240,255,0.4); }
    .info-btn.active { color:var(--cyan); border-color:rgba(0,240,255,0.5); background:var(--cyan-dim); }
    .video-info__channel {
      display:flex; align-items:center; gap:12px;
      padding:16px 0; border-top:var(--border); border-bottom:var(--border);
      margin-bottom:16px; cursor:pointer;
    }
    .channel-avatar-sm {
      width:44px; height:44px; border-radius:50%;
      border:1px solid rgba(0,240,255,0.3);
      box-shadow:0 0 12px rgba(0,240,255,0.2);
      object-fit:cover;
    }
    .channel-name { font-family:var(--font-display); font-size:0.8rem; color:var(--cyan); }
    .channel-subs  { font-size:0.7rem; color:var(--text-dim); font-family:var(--font-mono); }
    .subscribe-btn {
      margin-left:auto; padding:8px 18px;
      font-family:var(--font-display);
      font-size:0.65rem; font-weight:700; letter-spacing:0.1em;
      background:linear-gradient(135deg, rgba(255,0,212,0.2), rgba(255,0,212,0.05));
      border:1px solid rgba(255,0,212,0.4);
      color:var(--magenta); border-radius:var(--radius);
      transition:all 0.2s;
    }
    .subscribe-btn:hover { background:rgba(255,0,212,0.3); box-shadow:0 0 20px rgba(255,0,212,0.2); }
    .video-info__desc {
      font-size:0.82rem; line-height:1.65;
      color:var(--text-dim);
      max-height:80px; overflow:hidden;
      transition:max-height 0.5s ease;
      cursor:pointer;
      font-family:var(--font-body);
    }
    .video-info__desc.expanded { max-height:400px; }
    .desc-toggle {
      font-family:var(--font-mono); font-size:0.7rem;
      color:var(--cyan); cursor:pointer; margin-top:8px;
    }

    /* ── Related sidebar ── */
    .related-panel {
      grid-row:1/3;
      grid-column:2;
      display:flex; flex-direction:column; gap:12px;
    }
    @media(max-width:900px) { .related-panel { grid-row:auto; grid-column:1; } }
    .related-panel h3 {
      font-family:var(--font-display);
      font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase;
      color:var(--cyan); padding:16px; padding-bottom:0;
    }
    .related-card {
      display:flex; gap:10px;
      padding:10px;
      background:var(--surface);
      border:var(--border);
      border-radius:var(--radius);
      cursor:pointer;
      transition:all 0.25s;
    }
    .related-card:hover {
      border-color:rgba(0,240,255,0.4);
      background:var(--surface2);
      transform:translateX(-2px);
    }
    .related-card__thumb {
      width:120px; min-width:120px; aspect-ratio:16/9;
      border-radius:5px; overflow:hidden; position:relative;
    }
    .related-card__thumb img { width:100%; height:100%; object-fit:cover; }
    .related-card__info { flex:1; min-width:0; }
    .related-card__title {
      font-size:0.78rem; font-weight:600; line-height:1.35;
      margin-bottom:4px; color:var(--text);
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }
    .related-card__meta { font-size:0.65rem; color:var(--text-dim); font-family:var(--font-mono); }
  </style>
</head>
<body>
<div class="ns-loader" id="ns-loader">
  <div class="ns-loader__ring"></div>
  <div class="ns-loader__text">LOADING STREAM</div>
  <div class="ns-loader__bar"><div class="ns-loader__bar-fill" id="loader-bar"></div></div>
</div>

<header id="ns-header">
  <div class="ns-header__inner">
    <a href="index.html" class="ns-logo">NEXUS<span>STREAM</span></a>
    <nav class="ns-nav">
      <a href="index.html" data-page="index.html">Home</a>
      <a href="explore.html" data-page="explore.html">Explore</a>
      <a href="about.html" data-page="about.html">About</a>
    </nav>
    <button class="ns-header__search-btn" onclick="UI.pageTransition('search.html')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      SEARCH
    </button>
  </div>
</header>

<main class="ns-page">
  <div class="watch-layout" id="watchLayout">
    <!-- Player -->
    <div class="player-wrap" id="playerWrap">
      <iframe class="player-frame" id="playerFrame" src="" allowfullscreen
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
      <div class="player-corner player-corner--tl"></div>
      <div class="player-corner player-corner--tr"></div>
      <div class="player-corner player-corner--bl"></div>
      <div class="player-corner player-corner--br"></div>
      <div class="player-energy"></div>
    </div>

    <!-- Info -->
    <div class="video-info" id="videoInfo">
      <div class="ns-skeleton"><div class="sk-line" style="width:80%;height:20px;margin-bottom:12px"></div><div class="sk-line" style="width:50%"></div></div>
    </div>

    <!-- Related -->
    <div class="related-panel" id="relatedPanel">
      <h3>◈ Up Next</h3>
    </div>
  </div>
</main>

<footer id="ns-footer">
  <div class="ns-footer__brand">NEXUS<span style="color:var(--magenta)">STREAM</span></div>
  <div class="ns-footer__links">
    <a href="index.html">Home</a><a href="explore.html">Explore</a>
  </div>
  <div class="ns-footer__attr">Powered by YouTube Data API v3</div>
</footer>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script>
(async () => {
  const loader = document.getElementById('ns-loader');
  const bar = document.getElementById('loader-bar');
  setTimeout(() => bar.style.width='100%', 100);
  setTimeout(() => { loader.classList.add('hidden'); setTimeout(()=>loader.remove(),500); }, 1200);

  const params = new URLSearchParams(location.search);
  const videoId = params.get('v') || 'dQw4w9WgXcQ';

  // Load player
  const frame = document.getElementById('playerFrame');
  const wrap  = document.getElementById('playerWrap');
  frame.src = `https://www.youtube.com/embed/${videoId}?autoplay=0&rel=0&modestbranding=1`;
  frame.addEventListener('load', () => wrap.classList.add('playing'));

  // Video info
  const video = await API.getVideoDetails(videoId);
  const info  = document.getElementById('videoInfo');
  info.innerHTML = `
    <div class="video-info__title">${video.title}</div>
    <div class="video-info__stats">
      <div>Views <span>${video.views}</span></div>
      <div>·</div>
      <div>Likes <span>${video.likes || '—'}</span></div>
      <div>·</div>
      <div>Published <span>${video.publishedAt || '—'}</span></div>
    </div>
    <div class="video-info__actions">
      <button class="info-btn active">👍 Like</button>
      <button class="info-btn">🔔 Subscribe</button>
      <button class="info-btn">＋ Queue</button>
      <button class="info-btn" onclick="navigator.clipboard?.writeText(location.href)">⧉ Share</button>
    </div>
    <div class="video-info__channel" onclick="UI.pageTransition('channel.html?c=${video.channelId||'ch1'}')">
      <img class="channel-avatar-sm" src="https://picsum.photos/seed/${video.channel}/100/100" alt="${video.channel}" />
      <div>
        <div class="channel-name">${video.channel}</div>
        <div class="channel-subs">View Channel</div>
      </div>
      <button class="subscribe-btn">SUBSCRIBE</button>
    </div>
    <div class="video-info__desc" id="videoDesc">${video.description || 'No description available.'}</div>
    <div class="desc-toggle" id="descToggle">▾ Show more</div>
  `;

  UI.buildCardEffect(info, 200);
  UI.scanEffect(info, 600);

  const desc = document.getElementById('videoDesc');
  const toggle = document.getElementById('descToggle');
  toggle.addEventListener('click', () => {
    desc.classList.toggle('expanded');
    toggle.textContent = desc.classList.contains('expanded') ? '▴ Show less' : '▾ Show more';
  });

  // Related
  const relPanel = document.getElementById('relatedPanel');
  const { items } = await API.getTrending(8);
  const related = items.filter(v => v.id !== videoId);
  related.slice(0,7).forEach((v, i) => {
    const card = document.createElement('div');
    card.className = 'related-card';
    card.innerHTML = `
      <div class="related-card__thumb">
        <img src="${v.thumb}" alt="${v.title}" loading="lazy" onerror="this.src='https://picsum.photos/seed/${v.id}/120/68'">
      </div>
      <div class="related-card__info">
        <div class="related-card__title">${v.title}</div>
        <div class="related-card__meta">${v.channel}<br>${v.views} views</div>
      </div>
    `;
    card.addEventListener('click', () => UI.pageTransition(`watch.html?v=${v.id}`));
    relPanel.appendChild(card);
    UI.buildCardEffect(card, 300 + i * 80);
  });
})();
</script>
</body>
</html>
