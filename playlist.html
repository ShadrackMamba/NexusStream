<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playlist — NexusStream</title>
  <link rel="stylesheet" href="assets/css/global.css" />
  <script src="js/config.js"></script>
  <style>
    .playlist-layout {
      display:grid;
      grid-template-columns:380px 1fr;
      gap:28px;
      padding:32px 24px 80px;
      max-width:1400px; margin:0 auto;
    }
    @media(max-width:900px) { .playlist-layout { grid-template-columns:1fr; } }

    /* ── Sidebar ── */
    .playlist-sidebar {
      position:sticky; top:calc(var(--header-h) + 24px);
      height:fit-content;
    }
    .playlist-sidebar__cover {
      position:relative;
      border-radius:var(--radius-lg); overflow:hidden;
      margin-bottom:20px;
    }
    .playlist-sidebar__cover img {
      width:100%; aspect-ratio:16/9; object-fit:cover;
    }
    .playlist-sidebar__cover-overlay {
      position:absolute; inset:0;
      background:linear-gradient(to top, rgba(0,4,8,0.9) 0%, transparent 60%);
      display:flex; align-items:flex-end; padding:16px;
    }
    .playlist-meta {
      padding:0 4px;
    }
    .playlist-title {
      font-family:var(--font-display);
      font-size:1.2rem; font-weight:900;
      color:#fff; margin-bottom:8px;
    }
    .playlist-stats {
      font-family:var(--font-mono); font-size:0.7rem;
      color:var(--text-dim); margin-bottom:20px;
    }
    .playlist-stats span { color:var(--cyan); }
    .playlist-auto-scroll {
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 14px;
      background:var(--surface);
      border:var(--border);
      border-radius:var(--radius);
      margin-bottom:16px;
    }
    .playlist-auto-scroll label {
      font-family:var(--font-mono); font-size:0.7rem; color:var(--text-dim);
    }
    .toggle {
      width:36px; height:20px;
      background:rgba(0,240,255,0.2);
      border:1px solid rgba(0,240,255,0.4);
      border-radius:10px; cursor:pointer;
      position:relative; transition:background 0.2s;
    }
    .toggle.on { background:rgba(0,240,255,0.5); }
    .toggle::after {
      content:''; position:absolute;
      top:2px; left:2px;
      width:14px; height:14px;
      border-radius:50%; background:var(--cyan);
      transition:transform 0.2s;
    }
    .toggle.on::after { transform:translateX(16px); }

    /* ── Playlist items ── */
    .playlist-items { display:flex; flex-direction:column; gap:8px; }
    .playlist-item {
      display:flex; align-items:center; gap:12px;
      padding:10px 12px;
      background:var(--surface);
      border:var(--border);
      border-radius:var(--radius);
      cursor:pointer;
      transition:all 0.25s;
      position:relative;
    }
    .playlist-item:hover { border-color:rgba(0,240,255,0.3); background:var(--surface2); }
    .playlist-item.active {
      border-color:rgba(0,240,255,0.5);
      background:var(--cyan-dim);
      box-shadow:0 0 16px rgba(0,240,255,0.1);
      animation:pulseGlow 2s infinite;
    }
    .playlist-item__num {
      flex-shrink:0; width:24px;
      font-family:var(--font-mono); font-size:0.65rem;
      color:var(--text-dim); text-align:center;
    }
    .playlist-item.active .playlist-item__num { color:var(--cyan); }
    .playlist-item__thumb {
      width:80px; min-width:80px; aspect-ratio:16/9;
      border-radius:4px; overflow:hidden;
    }
    .playlist-item__thumb img { width:100%; height:100%; object-fit:cover; }
    .playlist-item__info { flex:1; min-width:0; }
    .playlist-item__title {
      font-size:0.78rem; font-weight:600; color:var(--text);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      margin-bottom:3px;
    }
    .playlist-item.active .playlist-item__title { color:var(--cyan); }
    .playlist-item__meta { font-size:0.65rem; color:var(--text-dim); font-family:var(--font-mono); }
    .playlist-item__duration {
      flex-shrink:0;
      font-size:0.65rem; font-family:var(--font-mono);
      color:var(--text-dim);
    }

    /* ── Now playing ── */
    .now-playing {
      background:var(--surface);
      border:var(--border);
      border-radius:var(--radius-lg);
      overflow:hidden;
      margin-bottom:20px;
    }
    .now-playing__frame {
      width:100%; aspect-ratio:16/9;
      display:block; border-bottom:var(--border);
    }
    .now-playing__info { padding:20px; }
    .now-playing__title {
      font-family:var(--font-display);
      font-size:1rem; font-weight:700; color:#fff;
      margin-bottom:8px;
    }
    .now-playing__meta { font-size:0.75rem; color:var(--text-dim); font-family:var(--font-mono); }
  </style>
</head>
<body>
<div class="ns-loader" id="ns-loader">
  <div class="ns-loader__ring"></div>
  <div class="ns-loader__text">LOADING PLAYLIST</div>
  <div class="ns-loader__bar"><div class="ns-loader__bar-fill" id="loader-bar"></div></div>
</div>

<header id="ns-header">
  <div class="ns-header__inner">
    <a href="index.html" class="ns-logo">NEXUS<span>STREAM</span></a>
    <nav class="ns-nav">
      <a href="index.html" data-page="index.html">Home</a>
      <a href="explore.html" data-page="explore.html">Explore</a>
    </nav>
    <button class="ns-header__search-btn" onclick="UI.pageTransition('search.html')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      SEARCH
    </button>
  </div>
</header>

<main class="ns-page">
  <div class="playlist-layout">

    <!-- Sidebar -->
    <div class="playlist-sidebar">
      <div class="playlist-sidebar__cover">
        <img src="https://picsum.photos/seed/playlist/480/270" alt="Playlist" id="playlistCover" />
        <div class="playlist-sidebar__cover-overlay">
          <div style="font-family:var(--font-mono);font-size:0.65rem;color:var(--cyan);letter-spacing:0.1em">◈ PLAYLIST</div>
        </div>
      </div>
      <div class="playlist-meta">
        <div class="playlist-title">NEXUS ESSENTIALS</div>
        <div class="playlist-stats"><span id="itemCount">—</span> videos · Curated for you</div>
        <div style="display:flex;gap:10px;margin-bottom:16px">
          <button class="ns-btn ns-btn--primary" onclick="playFirst()">▶ PLAY ALL</button>
          <button class="ns-btn ns-btn--ghost">⤢ SHUFFLE</button>
        </div>
        <div class="playlist-auto-scroll">
          <label>AUTO-ADVANCE</label>
          <div class="toggle on" id="autoToggle" onclick="this.classList.toggle('on')"></div>
        </div>
      </div>
    </div>

    <!-- Main -->
    <div>
      <div class="now-playing" id="nowPlaying">
        <iframe class="now-playing__frame" id="nowFrame" src="" allowfullscreen></iframe>
        <div class="now-playing__info" id="nowInfo">
          <div class="now-playing__title">Select a video to play</div>
          <div class="now-playing__meta">—</div>
        </div>
      </div>
      <div class="playlist-items" id="playlistItems"></div>
    </div>

  </div>
</main>

<footer id="ns-footer">
  <div class="ns-footer__brand">NEXUS<span style="color:var(--magenta)">STREAM</span></div>
  <div class="ns-footer__links">
    <a href="index.html">Home</a><a href="explore.html">Explore</a>
  </div>
  <div class="ns-footer__attr">Powered by YouTube Data API v3</div>
</footer>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script>
let currentIdx = 0;
let videos = [];

(async () => {
  const loader = document.getElementById('ns-loader');
  const bar = document.getElementById('loader-bar');
  setTimeout(() => bar.style.width='100%', 100);
  setTimeout(() => { loader.classList.add('hidden'); setTimeout(()=>loader.remove(),500); }, 1200);

  const { items } = await API.getTrending(10);
  videos = items;
  document.getElementById('itemCount').textContent = videos.length;

  const list = document.getElementById('playlistItems');
  videos.forEach((v, i) => {
    const item = document.createElement('div');
    item.className = 'playlist-item' + (i===0?' active':'');
    item.dataset.idx = i;
    item.innerHTML = `
      <div class="playlist-item__num">${i+1}</div>
      <div class="playlist-item__thumb">
        <img src="${v.thumb}" alt="${v.title}" onerror="this.src='https://picsum.photos/seed/${v.id}/80/45'">
      </div>
      <div class="playlist-item__info">
        <div class="playlist-item__title">${v.title}</div>
        <div class="playlist-item__meta">${v.channel}</div>
      </div>
      <div class="playlist-item__duration">${v.duration}</div>
    `;
    item.addEventListener('click', () => playVideo(i));
    list.appendChild(item);
    UI.buildCardEffect(item, i * 50);
  });

  playVideo(0);
})();

function playVideo(idx) {
  currentIdx = idx;
  const v = videos[idx];
  if (!v) return;

  document.querySelectorAll('.playlist-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  document.getElementById('nowFrame').src = `https://www.youtube.com/embed/${v.id}?autoplay=0&rel=0`;
  document.getElementById('nowInfo').innerHTML = `
    <div class="now-playing__title">${v.title}</div>
    <div class="now-playing__meta">${v.channel} · ${v.views} views · ${v.duration}</div>
  `;
  document.getElementById('playlistCover').src = v.thumb;
  // Scroll item into view
  const activeEl = document.querySelector('.playlist-item.active');
  if (activeEl) activeEl.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function playFirst() { playVideo(0); }
</script>
</body>
</html>
